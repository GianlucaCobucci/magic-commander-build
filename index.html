    function getScoreVerdict(dim, score, analysis, profile) {
      const c = analysis.counts;
      if (dim === 'ramp') {
        const range = profile.expected.ramp;
        if (c.ramp < range.min) return `Solo ${c.ramp}, troppo basso`;
        if (c.ramp > range.max) return `${c.ramp} ramp, ridondante`;
        return `${c.ramp} ramp, in linea`;
      }
      if (dim === 'draw') {
        if (c.draw < profile.expected.draw.min) return `${c.draw}, scarso`;
        return `${c.draw} pezzi, ${c.draw_engines} motori`;
      }
      if (dim === 'interaction') {
        if (c.interaction_total < profile.expected.interaction.min) return `${c.interaction_total}, poco`;
        return `${c.interaction_total} pezzi`;
      }
      if (dim === 'tutors') {
        if (c.tutors < profile.expected.tutors.min) return `Pochi (${c.tutors})`;
        return `${c.tutors} tutor`;
      }
      if (dim === 'mana_base') {
        return `${c.lands} lands`;
      }
      if (dim === 'curve') {
        return `Avg ${analysis.curve.avg.toFixed(2)}`;
      }
      if (dim === 'protection') {
        return `${c.protection} pezzi`;
      }
      if (dim === 'color_balance') {
        return analysis.colors.deck_identity.length === 1 ? 'Mono-color' : `${analysis.colors.deck_identity.length} colori`;
      }
      return '';
    }

    function CountBlock({ label, value, ideal, detail }) {
      const offTarget = ideal !== null && Math.abs(value - ideal) > Math.max(2, ideal * 0.3);
      return (
        <div className="bg-zinc-950 border border-zinc-800 rounded-lg p-3">
          <div className="text-xs text-zinc-500">{label}</div>
          <div className="flex items-baseline gap-1.5">
            <span className={`text-2xl font-bold ${offTarget ? 'text-amber-400' : 'text-zinc-100'}`}>{value}</span>
            {ideal !== null && <span className="text-xs text-zinc-600">/ {ideal} ideale</span>}
          </div>
          {detail && <div className="text-[10px] text-zinc-500 mt-0.5">{detail}</div>}
        </div>
      );
    }

    function CardsBreakdown({ cards }) {
      const [filter, setFilter] = useState('all');
      const groups = useMemo(() => {
        const tagFilter = {
          all: () => true,
          lands: c => c.tags.includes('land'),
          ramp: c => c.tags.some(t => t.startsWith('ramp_')),
          draw: c => c.tags.some(t => t.startsWith('draw_')),
          removal: c => c.tags.some(t => t.startsWith('removal_')),
          counters: c => c.tags.includes('counterspell'),
          tutors: c => c.tags.some(t => t.startsWith('tutor_')),
          protection: c => c.tags.includes('protection'),
          recursion: c => c.tags.includes('recursion'),
          untagged: c => c.tags.filter(t => t !== 'land' && t !== 'utility_land' && t !== 'fixing_land').length === 0
        };
        const fn = tagFilter[filter] || tagFilter.all;
        return cards.filter(fn).sort((a, b) => (a.cmc || 0) - (b.cmc || 0));
      }, [cards, filter]);

      const filters = [
        ['all', `Tutte (${cards.length})`],
        ['lands', 'Lands'],
        ['ramp', 'Ramp'],
        ['draw', 'Card draw'],
        ['removal', 'Removal'],
        ['counters', 'Counter'],
        ['tutors', 'Tutors'],
        ['protection', 'Protection'],
        ['recursion', 'Recursion'],
        ['untagged', 'Non taggate'],
      ];

      return (
        <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-6">
          <h3 className="text-sm font-semibold mb-3 text-zinc-300">Carte per categoria</h3>
          <div className="flex flex-wrap gap-1.5 mb-4">
            {filters.map(([k, label]) => (
              <button key={k} onClick={() => setFilter(k)}
                className={`px-3 py-1 text-xs rounded-full ${filter===k ? 'bg-amber-500 text-black font-medium' : 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'}`}>
                {label}
              </button>
            ))}
          </div>
          <div className="max-h-96 overflow-y-auto scrollbar-thin">
            <table className="w-full text-sm">
              <thead className="text-xs text-zinc-500 uppercase border-b border-zinc-800 sticky top-0 bg-zinc-900">
                <tr>
                  <th className="text-left py-2 pr-2">Nome</th>
                  <th className="text-left pr-2">Costo</th>
                  <th className="text-left pr-2">Tipo</th>
                  <th className="text-left pr-2">Tag</th>
                  <th className="text-right">€</th>
                </tr>
              </thead>
              <tbody>
                {groups.map((c, i) => (
                  <tr key={i} className="border-b border-zinc-800/60 hover:bg-zinc-800/30">
                    <td className="py-2 pr-2 font-medium">
                      {c.isCommander && <span className="text-amber-400 mr-1">★</span>}
                      <a href={c.scryfall_uri} target="_blank" rel="noreferrer" className="hover:text-amber-400">{c.name}</a>
                    </td>
                    <td className="pr-2"><ManaCost cost={c.mana_cost} /></td>
                    <td className="pr-2 text-xs text-zinc-400">{(c.type_line || '').replace(/—.*/, '').trim()}</td>
                    <td className="pr-2">
                      <div className="flex flex-wrap gap-1">
                        {c.tags.filter(t => t !== 'land').slice(0, 3).map(t => (
                          <span key={t} className="text-[10px] bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded">{t}</span>
                        ))}
                      </div>
                    </td>
                    <td className="text-right text-xs text-zinc-500">{c.price_eur ? c.price_eur.toFixed(2) : '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function LoadingScreen({ message }) {
      return (
        <div className="max-w-md mx-auto bg-zinc-900 border border-zinc-800 rounded-xl p-8 text-center">
          <div className="inline-block w-10 h-10 border-4 border-amber-500/30 border-t-amber-500 rounded-full animate-spin mb-4"></div>
          <div className="text-zinc-300 font-medium">{message}</div>
        </div>
      );
    }

    function ErrorScreen({ error, onBack }) {
      return (
        <div className="max-w-md mx-auto bg-red-950/40 border border-red-900/50 rounded-xl p-6">
          <h3 className="font-semibold text-red-300 mb-2">Qualcosa è andato storto</h3>
          <p className="text-sm text-red-200 mb-4">{error}</p>
          <button onClick={onBack} className="bg-zinc-800 hover:bg-zinc-700 text-sm px-4 py-2 rounded-lg">
            Torna indietro
          </button>
        </div>
      );
    }

    // ============================================================
    // APP PRINCIPALE
    // ============================================================

    function App() {
      const [step, setStep] = useState(0); // 0=input, 1=confirm, 2=results
      const [phase, setPhase] = useState('input'); // input | fetching | confirm | analyzing | results | error
      const [data, setData] = useState(null);
      const [analysis, setAnalysis] = useState(null);
      const [scores, setScores] = useState(null);
      const [error, setError] = useState('');
      const [apiKey, setApiKeyState] = useState(getApiKey());
      const [showApiKeyModal, setShowApiKeyModal] = useState(false);
      const [synergies, setSynergies] = useState(null);
      const [recommendations, setRecommendations] = useState(null);
      const [generated, setGenerated] = useState(null);

      // Cache key che incorpora la modalità archetipo
      function buildCacheKey(prefix, d) {
        if (!d?.commander) return null;
        const archCtx = getEffectiveArchetypeContext(d);
        return `${prefix}_${d.commander.name}_${archCtx.mode}_${archCtx.label}_${(archCtx.description || '').slice(0,40)}_b${d.bracketTarget}`;
      }

      // Quando arriviamo alla schermata risultati, prova a caricare le sinergie e raccomandazioni dalla cache
      useEffect(() => {
        if (phase === 'results' && data?.commander) {
          const synKey = buildCacheKey('synergies', data);
          const recKey = buildCacheKey('recs', data);
          const cachedSyn = synKey ? loadFromCache(synKey) : null;
          const cachedRec = recKey ? loadFromCache(recKey) : null;
          setSynergies(cachedSyn || null);
          setRecommendations(cachedRec || null);
          if (cachedRec?.cuts && data.cards) {
            cachedRec.cuts.forEach(c => {
              const cd = data.cards.find(card => card.name === c.card);
              if (cd) c.cardData = cd;
            });
          }
        }
      }, [phase, data]);

      const handleAnalyze = async (parsedData) => {
        setPhase('fetching');
        setStep(1);
        try {
          const cardNames = parsedData.cards.map(c => c.name);
          const { fetched, notFound } = await fetchCardsFromScryfall(cardNames);

          const enriched = parsedData.cards
            .map(c => {
              const sc = fetched[c.name.toLowerCase()];
              if (!sc) return null;
              return normalizeCard(sc, c.name, c.isCommander);
            })
            .filter(Boolean);

          let commander = enriched.find(c => c.isCommander);
          if (!commander && parsedData.commanderHint) {
            commander = enriched.find(c => c.name.toLowerCase() === parsedData.commanderHint.toLowerCase());
            if (commander) commander.isCommander = true;
          }
          if (!commander) {
            const legendaries = enriched.filter(c =>
              c.type_line.toLowerCase().includes('legendary') &&
              c.type_line.toLowerCase().includes('creature')
            );
            if (legendaries.length === 1) {
              legendaries[0].isCommander = true;
              commander = legendaries[0];
            }
          }

          let initialData = {
            cards: enriched,
            commander,
            archetype: parsedData.archetype,
            archetypeMode: parsedData.archetypeMode,
            customStrategy: parsedData.customStrategy,
            bracketTarget: parsedData.bracketTarget,
            notFound,
            autoDetected: null,
          };

          // Se modalità auto, lancia auto-detect
          if (parsedData.archetypeMode === 'auto' && commander) {
            if (!apiKey) {
              setShowApiKeyModal(true);
              setError('Per usare auto-rileva serve la chiave API Claude. Impostala e riprova.');
              setPhase('error');
              return;
            }
            try {
              const detected = await autoDetectArchetype(commander, enriched, apiKey);
              initialData.autoDetected = detected;
              // Se Claude ha identificato un primary_archetype valido, settalo come archetype effettivo
              if (detected?.primary_archetype && ARCHETYPES[detected.primary_archetype]) {
                initialData.archetype = detected.primary_archetype;
              }
            } catch (e) {
              console.error('Auto-detect failed:', e);
              // Continua comunque con archetipo midrange di default
            }
          }

          setData(initialData);
          setPhase('confirm');
        } catch (e) {
          setError(e.message);
          setPhase('error');
        }
      };

      const handleConfirm = () => {
        setPhase('analyzing');
        setStep(2);
        setTimeout(() => {
          try {
            const ana = analyzeDeck(data.cards);
            const sc = computeScores(ana, data.archetype);
            setAnalysis(ana);
            setScores(sc);
            setPhase('results');
            setStep(3);
          } catch (e) {
            setError(e.message);
            setPhase('error');
          }
        }, 300);
      };

      const handleReset = () => {
        setPhase('input');
        setStep(0);
        setData(null);
        setAnalysis(null);
        setScores(null);
        setSynergies(null);
        setRecommendations(null);
        setGenerated(null);
        setError('');
      };

      return (
        <div className="min-h-screen p-4 md:p-8">
          <header className="max-w-6xl mx-auto mb-8 flex items-start justify-between gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold tracking-tight">
                Commander Deck Evaluator
              </h1>
              <p className="text-sm text-zinc-400 mt-1">
                Analisi euristica di mazzi Commander · Scryfall + euristiche per archetipo
              </p>
            </div>
            <ApiKeyIndicator apiKey={apiKey} onClick={() => setShowApiKeyModal(true)} />
          </header>

          <main className="max-w-6xl mx-auto">
            <StepIndicator current={step} />

            {phase === 'input' && <InputStep onAnalyze={handleAnalyze} />}
            {phase === 'fetching' && <LoadingScreen message={data?.archetypeMode === 'auto' ? "Recupero le carte e auto-rilevo l'archetipo…" : "Sto recuperando le carte da Scryfall…"} />}
            {phase === 'confirm' && data && <ConfirmStep data={data} onConfirm={handleConfirm} onBack={handleReset} />}
            {phase === 'analyzing' && <LoadingScreen message="Sto analizzando il mazzo…" />}
            {phase === 'results' && analysis && scores && (
              <ResultsView
                data={data}
                analysis={analysis}
                scores={scores}
                onReset={handleReset}
                apiKey={apiKey}
                onApiKeyMissing={() => setShowApiKeyModal(true)}
                synergies={synergies}
                setSynergies={setSynergies}
                recommendations={recommendations}
                setRecommendations={setRecommendations}
                generated={generated}
                setGenerated={setGenerated}
              />
            )}
            {phase === 'error' && <ErrorScreen error={error} onBack={handleReset} />}
          </main>

          <ApiKeyModal
            open={showApiKeyModal}
            onClose={() => setShowApiKeyModal(false)}
            onSave={(k) => { setApiKeyState(k); setShowApiKeyModal(false); }}
          />

          <footer className="max-w-6xl mx-auto mt-16 pt-6 border-t border-zinc-800 text-xs text-zinc-500 text-center">
            v0.5 · Synergy + Bracket + Recommendations + Generator · 3 modalità archetipo · Scryfall + Claude + Spellbook + EDHREC
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
