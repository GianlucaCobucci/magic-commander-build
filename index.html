    // ============================================================
    // ANTHROPIC API — Fase 2: Synergy Engine
    // ============================================================

    const ANTHROPIC_MODEL = 'claude-sonnet-4-6';
    const ANTHROPIC_API_URL = 'https://api.anthropic.com/v1/messages';
    const CACHE_PREFIX = 'mtg_eval_';

    function getApiKey() {
      return localStorage.getItem('anthropic_api_key') || '';
    }
    function setApiKeyStorage(key) {
      if (key) localStorage.setItem('anthropic_api_key', key);
      else localStorage.removeItem('anthropic_api_key');
    }
    function loadFromCache(key) {
      try {
        const v = localStorage.getItem(CACHE_PREFIX + key);
        return v ? JSON.parse(v) : null;
      } catch { return null; }
    }
    function saveToCache(key, value) {
      try { localStorage.setItem(CACHE_PREFIX + key, JSON.stringify(value)); }
      catch (e) { console.warn('Cache write failed:', e); }
    }

    async function callClaude(apiKey, systemPrompt, userPrompt, maxTokens = 2000) {
      const res = await fetch(ANTHROPIC_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: ANTHROPIC_MODEL,
          max_tokens: maxTokens,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }],
        }),
      });
      if (!res.ok) {
        let errMsg = `Errore API ${res.status}`;
        try {
          const err = await res.json();
          if (err.error?.message) errMsg += `: ${err.error.message}`;
        } catch {}
        throw new Error(errMsg);
      }
      const json = await res.json();
      const textBlock = json.content?.find(b => b.type === 'text');
      if (!textBlock) throw new Error('Risposta Claude vuota');
      return textBlock.text;
    }

    function extractJsonFromResponse(text) {
      let cleaned = text.trim()
        .replace(/^```(?:json)?\s*/i, '')
        .replace(/\s*```$/i, '');
      const objStart = cleaned.indexOf('{');
      const arrStart = cleaned.indexOf('[');
      let start = -1;
      if (objStart === -1) start = arrStart;
      else if (arrStart === -1) start = objStart;
      else start = Math.min(objStart, arrStart);
      if (start === -1) throw new Error('Nessun JSON trovato nella risposta');
      cleaned = cleaned.slice(start);

      // Tentativo 1: parse diretto
      try { return JSON.parse(cleaned); } catch {}

      // Tentativo 2: tronca all'ultima graffa/quadra valida
      for (let i = cleaned.length - 1; i > 0; i--) {
        if (cleaned[i] === '}' || cleaned[i] === ']') {
          try { return JSON.parse(cleaned.slice(0, i + 1)); }
          catch { continue; }
        }
      }

      // Tentativo 3: ripara JSON troncato chiudendo array/oggetti aperti
      try {
        let repaired = cleaned;
        // Rimuovi virgola finale se presente
        repaired = repaired.replace(/,\s*$/, '');
        // Rimuovi stringhe non terminate alla fine
        const lastQuote = repaired.lastIndexOf('"');
        const afterLastQuote = repaired.slice(lastQuote + 1);
        if (afterLastQuote.includes('"') === false && afterLastQuote.length > 0 && !/[\}\],]/.test(afterLastQuote.trim())) {
          // C'è una stringa aperta in coda, troncala
          repaired = repaired.slice(0, lastQuote);
          // Rimuovi anche eventuale chiave incompleta tipo  "key":
          repaired = repaired.replace(/,\s*"[^"]*"\s*:?\s*$/, '');
          repaired = repaired.replace(/,\s*$/, '');
        }
        // Conta parentesi aperte non chiuse e chiudile
        let depth = 0;
        let inString = false;
        let escape = false;
        const stack = [];
        for (let i = 0; i < repaired.length; i++) {
          const ch = repaired[i];
          if (escape) { escape = false; continue; }
          if (ch === '\\') { escape = true; continue; }
          if (ch === '"') { inString = !inString; continue; }
          if (inString) continue;
          if (ch === '{' || ch === '[') stack.push(ch);
          else if (ch === '}') { if (stack[stack.length-1] === '{') stack.pop(); }
          else if (ch === ']') { if (stack[stack.length-1] === '[') stack.pop(); }
        }
        // Chiudi gli aperti
        while (stack.length > 0) {
          const open = stack.pop();
          repaired += (open === '{' ? '}' : ']');
        }
        return JSON.parse(repaired);
      } catch {}

      throw new Error('Impossibile parsare il JSON dalla risposta di Claude (probabilmente troppo lunga)');
    }

    async function extractCommanderProfile(commander, apiKey) {
      const sys = `Sei un esperto di Magic: The Gathering, formato Commander. Estrai il profilo strategico di un comandante in JSON strutturato. Rispondi SOLO con JSON valido, senza testo extra né markdown fences.`;
      const usr = `Comandante: ${commander.name}
Color Identity: ${(commander.color_identity || []).join('') || 'C'}
Tipo: ${commander.type_line}
Costo: ${commander.mana_cost}
Testo Oracle: ${commander.oracle_text}

Estrai il profilo del comandante in questo JSON (in italiano, descrizioni concise):
{
  "primary_strategy": "una frase: cosa fa il commander e come spinge a vincere",
  "key_mechanics": ["meccaniche chiave: es. sacrifice, graveyard, tokens, +1/+1 counters"],
  "cared_about_types": ["tipi creatura/permanente rilevanti, es. Wolf, Human, Artifact"],
  "cared_about_keywords": ["keyword rilevanti, es. flying, menace, lifelink"],
  "needs_to_function": ["cosa serve sul tavolo per far girare il commander"],
  "payoffs": ["cosa fa quando attiva/triggera"],
  "vulnerabilities": ["debolezze: es. removal su commander, odio cimitero"]
}`;
      const text = await callClaude(apiKey, sys, usr, 1000);
      return extractJsonFromResponse(text);
    }

    async function scoreSynergiesBatch(cards, commander, profile, archetype, apiKey, onProgress, archetypeContext) {
      const archetypeLabel = archetypeContext?.label || ARCHETYPES[archetype]?.label || archetype;
      const archetypeFullContext = archetypeContext?.full_context || `Archetipo: ${archetypeLabel}`;
      const BATCH_SIZE = 17;
      const BASIC_LANDS = ['plains','island','swamp','mountain','forest','wastes',
        'snow-covered plains','snow-covered island','snow-covered swamp',
        'snow-covered mountain','snow-covered forest'];
      const toEvaluate = cards.filter(c =>
        !c.isCommander && !BASIC_LANDS.includes(c.name.toLowerCase())
      );
      const results = {};
      const batches = [];
      for (let i = 0; i < toEvaluate.length; i += BATCH_SIZE) {
        batches.push(toEvaluate.slice(i, i + BATCH_SIZE));
      }

      const sys = `Sei un esperto di Magic: The Gathering Commander. Valuti la sinergia di carte rispetto a un comandante specifico. Sii rigoroso: l'utility generico (Sol Ring, Counterspell base, Swords to Plowshares) NON è sinergia, è goodstuff e va categorizzato come utility_generic. La sinergia vera è specifica al comandante e alla strategia dichiarata. Rispondi SOLO con JSON valido, senza markdown fences né testo extra.`;

      for (let bi = 0; bi < batches.length; bi++) {
        if (onProgress) onProgress(bi, batches.length);
        const batch = batches[bi];
        const cardList = batch.map((c, i) =>
          `${i+1}. ${c.name} | ${c.type_line || '?'} | CMC ${c.cmc} | ${c.oracle_text || '(no text)'}`
        ).join('\n');

        const usr = `COMANDANTE: ${commander.name}
PROFILO COMMANDER: ${JSON.stringify(profile)}
STRATEGIA / CONTESTO ARCHETIPO:
${archetypeFullContext}

Per ogni carta, valuta sinergia con questo comandante in questa strategia (0-10):
- 10 = pezzo chiave imprescindibile per la strategia
- 8-9 = amplificatore forte e specifico
- 6-7 = utile in tema ma non specifico per QUESTO commander
- 4-5 = filler accettabile, no sinergia specifica
- 1-3 = debole o off-theme
- 0 = misfit completo

Categoria (UNA sola):
- enabler = abilita direttamente la strategia del commander
- amplifier = amplifica/moltiplica i payoff del commander
- protector = protegge il commander o la strategia
- tribal = condivide tipo creatura rilevante per il commander
- utility_generic = utile ma generico, no sinergia specifica
- redundant = ridondante con altre carte simili nel mazzo
- misfit = non adatto al deck, da tagliare

JSON array, una entry per carta nello stesso ordine, schema:
[{"n":1,"name":"...","score":0-10,"category":"...","why":"max 12 parole italiano"}]

CARTE:
${cardList}`;

        try {
          const text = await callClaude(apiKey, sys, usr, 3500);
          const parsed = extractJsonFromResponse(text);
          if (Array.isArray(parsed)) {
            parsed.forEach(entry => {
              const cardName = entry.name;
              const match = batch.find(c => c.name.toLowerCase() === (cardName || '').toLowerCase())
                         || batch[entry.n - 1];
              if (match) {
                results[match.name] = {
                  score: typeof entry.score === 'number' ? entry.score : 5,
                  category: entry.category || 'utility_generic',
                  reasoning: entry.why || entry.reasoning || '',
                };
              }
            });
          }
        } catch (e) {
          console.error(`Batch ${bi} failed:`, e);
        }
        await new Promise(r => setTimeout(r, 200));
      }
      if (onProgress) onProgress(batches.length, batches.length);
      return results;
    }

    function ApiKeyModal({ open, onClose, onSave }) {
      const [key, setKey] = useState(getApiKey());

        const trimmed = key.trim();
        if (!trimmed.startsWith('sk-ant-')) {
          setError('La chiave deve iniziare con "sk-ant-"');
          return;
        }
        setTesting(true);
        setError('');
        try {
          await callClaude(trimmed, 'Rispondi solo con la parola: ok', 'test', 10);
          setApiKeyStorage(trimmed);
          setTesting(false);
          onSave(trimmed);
        } catch (e) {
          setTesting(false);
          setError(`Test fallito: ${e.message}`);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
          <div className="bg-zinc-900 border border-zinc-700 rounded-xl max-w-lg w-full p-6">
            <h3 className="text-lg font-semibold mb-2">Chiave API Anthropic</h3>
            <p className="text-sm text-zinc-400 mb-4">
              Per analizzare le sinergie serve la tua chiave Claude. Resta solo nel tuo browser, non lascia mai il computer.
            </p>
            <div className="bg-zinc-950 border border-zinc-800 rounded-lg p-3 mb-4 text-xs text-zinc-400">
              <strong className="text-zinc-300">Come ottenerla:</strong>
              <ol className="list-decimal list-inside mt-1 space-y-0.5">
                <li>Vai su <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer" className="text-amber-400 underline">console.anthropic.com/settings/keys</a></li>
                <li>"Create Key", dai un nome, copiala</li>
                <li>Incollala qui sotto (inizia con sk-ant-)</li>
              </ol>
            </div>
            <input
              type="password"
              value={key}
              onChange={e => setKey(e.target.value)}
              placeholder="sk-ant-..."
              className="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-sm font-mono focus:outline-none focus:border-amber-500/50"
            />
            {error && <div className="mt-2 text-xs text-red-400">{error}</div>}
            <div className="flex gap-2 mt-4">
              <button onClick={onClose} className="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm">Annulla</button>
              <button
                onClick={handleSave}
                disabled={testing || !key.trim()}
                className="flex-1 bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-500 text-black font-semibold py-2 rounded-lg"
              >
                {testing ? 'Verifico la chiave...' : 'Salva e verifica'}
              </button>
            </div>
            <p className="text-[10px] text-zinc-600 mt-3">
              La chiave viene testata con una micro-chiamata (frazione di centesimo) per essere sicuri che funzioni.
            </p>
          </div>
        </div>
      );
    }

    function SynergyTab({ analysis, data, apiKey, onApiKeyMissing, synergies, setSynergies }) {
      const [running, setRunning] = useState(false);
      const [progress, setProgress] = useState({ current: 0, total: 0, phase: '' });
      const [error, setError] = useState('');

      const cacheKey = useMemo(() => {
        const archCtx = getEffectiveArchetypeContext(data);
        return `synergies_${data.commander?.name}_${archCtx.mode}_${archCtx.label}_${(archCtx.description || '').slice(0,40)}_b${data.bracketTarget}`;
      }, [data]);

      const handleRun = async () => {
        if (!apiKey) { onApiKeyMissing(); return; }
        setRunning(true);
        setError('');
        try {
          setProgress({ current: 0, total: 0, phase: 'Estraggo il profilo del comandante...' });
          const profile = await extractCommanderProfile(data.commander, apiKey);

          setProgress({ current: 0, total: 1, phase: 'Analizzo le sinergie carta per carta...' });
          const archetypeContext = getEffectiveArchetypeContext(data);
          const scores = await scoreSynergiesBatch(
            analysis.all_cards,
            data.commander,
            profile,
            data.archetype,
            apiKey,
            (curr, total) => setProgress({ current: curr, total, phase: 'Analizzo le sinergie carta per carta...' }),
            archetypeContext
          );

          const result = { profile, scores };
          setSynergies(result);
          saveToCache(cacheKey, result);
          setRunning(false);
        } catch (e) {
          setError(e.message);
          setRunning(false);
        }
      };

      const handleClearCache = () => {
        localStorage.removeItem(CACHE_PREFIX + cacheKey);
        setSynergies(null);
      };

      if (running) {
        return (
          <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-8 text-center">

              <div className="text-xs text-zinc-500">
                Batch {progress.current} di {progress.total}

        return <SynergyResults synergies={synergies} cards={analysis.all_cards} commander={data.commander} onRerun={handleClearCache} />;

      return (
        <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-8 text-center">

          </p>
          <p className="text-xs text-zinc-500 mb-6">
            Tempo: ~30-60 secondi · Costo stimato: ~10-15 centesimi · Risultato salvato in cache locale
          </p>
          {!apiKey && (
            <p className="text-xs text-amber-400 mb-4">
              Prima serve la tua chiave Anthropic. Cliccando il bottone te la chiederò.
            </p>

          <button
            onClick={handleRun}
            className="bg-amber-500 hover:bg-amber-400 text-black font-semibold px-6 py-2.5 rounded-lg"

    const MLD_NAMES_EXTRA = new Set([
      "Armageddon", "Catastrophe", "Cataclysm", "Decree of Annihilation",
      "Destructive Force", "Devastation", "Jokulhaups", "Obliterate",
      "Ravages of War", "Wildfire", "Worldfire", "Burning Sands",

    function detectBracketFactors(cards) {
      const factors = {
        gameChangers: [],
        mld: [],
        extraTurns: [],
        tutorsUnconditional: [],
        infiniteCombosNote: false,
      };

      cards.forEach(c => {
        if (GAME_CHANGERS.has(c.name)) factors.gameChangers.push(c.name);
        if (c.tags?.includes('mld') || MLD_NAMES_EXTRA.has(c.name)) {
          if (!factors.mld.includes(c.name)) factors.mld.push(c.name);
        }
        if (c.tags?.includes('extra_turn')) factors.extraTurns.push(c.name);
        if (c.tags?.includes('tutor_unconditional')) factors.tutorsUnconditional.push(c.name);
      });

      return factors;
    }

    function estimateBracket(factors, combos, archetype) {
      // Logica:
      // - 0 Game Changer + 0 MLD + 0 extra turn + tutor <=1 → bracket 2
      // - 1-2 Game Changer e niente combo → bracket 3
      // - 3+ Game Changer OR MLD OR 2+ extra turn OR combo → bracket 4
      // - Archetipo cEDH OR (combo + tutor>=4 + GC>=3) → bracket 5
      const gcCount = factors.gameChangers.length;
      const mldCount = factors.mld.length;
      const etCount = factors.extraTurns.length;
      const tutorCount = factors.tutorsUnconditional.length;
      const comboCount = combos.length;
      const isCedhArch = archetype.startsWith('cedh');

      const drivers = [];
      let bracket = 2;

      if (isCedhArch) {
        bracket = 5;
        drivers.push(`Archetipo dichiarato cEDH (${archetype})`);
      }

      if (gcCount >= 3) {
        bracket = Math.max(bracket, 4);
        drivers.push(`${gcCount} Game Changer presenti (soglia ≥3 → bracket 4)`);
      } else if (gcCount >= 1) {
        bracket = Math.max(bracket, 3);
        drivers.push(`${gcCount} Game Changer presenti (soglia ≥1 → bracket 3)`);
      }

      if (mldCount >= 1) {
        bracket = Math.max(bracket, 4);
        drivers.push(`${mldCount} carte di Mass Land Destruction → bracket 4 minimo`);
      }

      if (etCount >= 2) {
        bracket = Math.max(bracket, 4);
        drivers.push(`${etCount} extra turn (chain potenziale) → bracket 4 minimo`);
      } else if (etCount === 1) {
        bracket = Math.max(bracket, 3);
        drivers.push(`1 carta extra turn → bracket 3 minimo`);
      }

      if (comboCount >= 1) {
        bracket = Math.max(bracket, 3);
        drivers.push(`${comboCount} combo certificate da Commander Spellbook`);
        if (comboCount >= 2) {
          bracket = Math.max(bracket, 4);
          drivers.push(`Multiple combo (≥2) → bracket 4 minimo`);
        }
      }

      if (tutorCount >= 5) {
        bracket = Math.max(bracket, 4);
        drivers.push(`${tutorCount} tutor incondizionati → tendenza bracket 4`);
      } else if (tutorCount >= 3) {
        bracket = Math.max(bracket, 3);
        drivers.push(`${tutorCount} tutor incondizionati`);
      }

      // Se è cEDH e ci sono combo + tutor pesanti, push a 5
      if (gcCount >= 5 && tutorCount >= 4 && comboCount >= 1) {
        bracket = 5;
        if (!drivers.find(d => d.startsWith('Archetipo'))) {
          drivers.push('Densità Game Changer + tutor + combo da bracket 5');
        }
      }

      // Se nessun driver, è un mazzo "casual"
      if (drivers.length === 0) {
        drivers.push('Nessun indicatore di power level alto rilevato');
      }

      return { bracket, drivers };
    }

    async function fetchCommanderSpellbookCombos(cards) {
      // Commander Spellbook API - può fallire per CORS, rete, o cambio endpoint.
      // Non deve mai bloccare il resto dell'app.
      try {
        const cardNames = cards.map(c => c.name);
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s timeout

        const res = await fetch('https://backend.commanderspellbook.com/find-my-combos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            commanders: cards.filter(c => c.isCommander).map(c => c.name),
            main: cardNames,
          }),
          signal: controller.signal,
        });
        clearTimeout(timeoutId);

        if (!res.ok) {
          console.warn('Commander Spellbook risposta non ok:', res.status);
          return { combos: [], error: `Spellbook ha risposto con status ${res.status}` };
        }
        const json = await res.json();
        const combos = json.results?.included || json.included || json.results || [];
        const normalized = combos.map(c => ({
          id: c.id,
          name: c.name || (c.uses ? c.uses.map(u => u.card?.name || u.name).join(' + ') : 'Combo'),
          uses: (c.uses || []).map(u => u.card?.name || u.name).filter(Boolean),
          produces: (c.produces || []).map(p => p.feature?.name || p.name).filter(Boolean),
          description: c.description || '',
          notes: c.notes || '',
        })).filter(c => c.uses && c.uses.length > 0);
        return { combos: normalized, error: null };
      } catch (e) {
        const msg = e.name === 'AbortError'
          ? 'Timeout (15s)'
          : (e.message || 'Errore di rete');
        console.warn('Errore Commander Spellbook:', msg);
        return { combos: [], error: msg };
      }
    }

    function BracketTab({ analysis, data }) {
      const [combos, setCombos] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const factors = useMemo(() => detectBracketFactors(analysis.all_cards), [analysis]);
      const bracketResult = useMemo(
        () => estimateBracket(factors, combos || [], data.archetype),
        [factors, combos, data.archetype]
      );

      const handleFetchCombos = async () => {
        setLoading(true);
        setError('');
        try {
          const result = await fetchCommanderSpellbookCombos(analysis.all_cards);
          setCombos(result.combos);
          if (result.error) setError(`Spellbook non disponibile: ${result.error}`);
        } catch (e) {
          setError(e.message || 'Errore di rete');
          setCombos([]);
        }
        setLoading(false);
      };

      // Auto-fetch combos al primo render
      useEffect(() => {
        if (combos === null && !loading) {
          handleFetchCombos();
        }
      }, []);

      const target = data.bracketTarget;
      const estimated = bracketResult.bracket;
      const matchStatus = estimated === target ? 'match'
                       : estimated > target ? 'over'
                       : 'under';

      return (
        <div className="space-y-6">

    // ============================================================
    // HELPER — Modalità Auto-rileva e Custom (per archetipo)
    // ============================================================

    // Auto-rileva archetipo leggendo decklist + commander
    async function autoDetectArchetype(commander, cards, apiKey) {
      const sys = `Sei un esperto di Magic: The Gathering Commander. Analizza un mazzo e identifica archetipo principale, eventuali sotto-temi, e piano di gioco. Rispondi SOLO con JSON valido, no markdown fences.`;

      const cardSummary = cards
        .filter(c => !c.isCommander)
        .slice(0, 99)
        .map(c => `${c.name} (${c.type_line.replace(/—.*/, '').trim()}, CMC ${c.cmc})`)
        .join(', ');

      const usr = `COMANDANTE: ${commander.name}
TESTO: ${commander.oracle_text}
COLOR IDENTITY: ${(commander.color_identity || []).join('') || 'C'}

CARTE NEL MAZZO (99):
${cardSummary}

Identifica:
1. Archetipo principale (uno tra: cedh_combo, cedh_stax, cedh_midrange, voltron, aristocrats, aggro, control, combo, midrange, reanimator, tokens, tribal, spellslinger, lands_matter, group_hug, lifegain, stax, big_mana)
2. Sotto-temi se presenti
3. Piano di gioco descritto come fosse il proprietario del mazzo (3-4 frasi italiano)

JSON:
{
  "primary_archetype": "...",
  "secondary_themes": ["..."],
  "strategy_description": "descrizione in italiano del piano di gioco completo",
  "win_conditions": ["come vince il mazzo"]
}`;

      const text = await callClaude(apiKey, sys, usr, 1200);
      return extractJsonFromResponse(text);
    }

    // Restituisce la "descrizione effettiva" dell'archetipo da usare nei prompt
    // Combina il preset con eventuale auto-detect o descrizione custom
    function getEffectiveArchetypeContext(data) {
      const archetypeMode = data.archetypeMode || 'preset';
      if (archetypeMode === 'preset') {
        return {
          mode: 'preset',
          label: ARCHETYPES[data.archetype]?.label || data.archetype,
          description: ARCHETYPES[data.archetype]?.description || '',
          full_context: `Archetipo: ${ARCHETYPES[data.archetype]?.label}. ${ARCHETYPES[data.archetype]?.description}`,
        };
      }
      if (archetypeMode === 'auto' && data.autoDetected) {
        return {
          mode: 'auto',
          label: ARCHETYPES[data.autoDetected.primary_archetype]?.label || data.autoDetected.primary_archetype,
          description: data.autoDetected.strategy_description || '',
          full_context: `Archetipo principale: ${ARCHETYPES[data.autoDetected.primary_archetype]?.label || data.autoDetected.primary_archetype}.
Sotto-temi: ${(data.autoDetected.secondary_themes || []).join(', ')}.
Piano: ${data.autoDetected.strategy_description}.
Win conditions: ${(data.autoDetected.win_conditions || []).join('; ')}.`,
        };
      }
      if (archetypeMode === 'custom') {
        return {
          mode: 'custom',
          label: 'Strategia personalizzata',
          description: data.customStrategy || '',
          full_context: `Strategia personalizzata definita dall'utente:
${data.customStrategy}`,
        };
      }
      return {
        mode: 'preset',
        label: 'Midrange',
        description: '',
        full_context: 'Archetipo: Midrange.',
      };
    }

    // ============================================================
    // FASE 5 — Generatore Lista Ottimizzata
    // ============================================================

    // ============================================================
    // GENERATORE OTTIMIZZATO (v2 con mana base deterministica)
    // ============================================================

    // Restituisce il profilo ARCHETYPES da usare nel generatore.
    // - Modalità preset: usa direttamente data.archetype
    // - Modalità auto: usa l'archetipo primario rilevato
    // - Modalità custom: deduce un archetipo "vicino" dalla descrizione, fallback midrange
    function resolveArchetypeProfile(data, archetypeContext) {
      if (data.archetype && ARCHETYPES[data.archetype]) {
        return { profile: ARCHETYPES[data.archetype], key: data.archetype };
      }
      if (data.autoDetected?.primary_archetype && ARCHETYPES[data.autoDetected.primary_archetype]) {
        return { profile: ARCHETYPES[data.autoDetected.primary_archetype], key: data.autoDetected.primary_archetype };
      }
      // Modalità custom: cerca match per parole chiave nella descrizione
      const text = `${archetypeContext.label} ${archetypeContext.description} ${archetypeContext.full_context}`.toLowerCase();
      const keywordMap = [
        ['cedh combo', 'cedh_combo'], ['cedh stax', 'cedh_stax'], ['cedh', 'cedh_midrange'],
        ['voltron', 'voltron'], ['aristocrat', 'aristocrats'], ['reanimator', 'reanimator'],
        ['control', 'control'], ['token', 'tokens'], ['tribal', 'tribal'],
        ['spellslinger', 'spellslinger'], ['lands matter', 'lands_matter'], ['lands_matter', 'lands_matter'],
        ['big mana', 'big_mana'], ['ramp', 'big_mana'], ['lifegain', 'midrange'],
        ['stax', 'cedh_stax'], ['combo', 'cedh_combo'], ['aggro', 'midrange'],
      ];
      for (const [kw, key] of keywordMap) {
        if (text.includes(kw) && ARCHETYPES[key]) {
          return { profile: ARCHETYPES[key], key };
        }
      }
      return { profile: ARCHETYPES.midrange, key: 'midrange' };
    }

    // Costruisce le linee guida testuali per il prompt, basate sul profilo archetipo
    function buildArchetypeGuidelines(profile, archetypeKey, archetypeContext, targetNonLand) {
      const exp = profile.expected;
      const lines = [];
      lines.push(`PROFILO QUANTITATIVO PER L'ARCHETIPO "${profile.label}":`);
      lines.push(`- Ramp: ${exp.ramp.min}-${exp.ramp.max} (ideale ${exp.ramp.ideal})`);
      lines.push(`- Card draw / advantage: ${exp.draw.min}-${exp.draw.max} (ideale ${exp.draw.ideal})`);
      lines.push(`- Interaction (removal + counter + spazza-via): ${exp.interaction.min}-${exp.interaction.max} (ideale ${exp.interaction.ideal})`);
      lines.push(`- Tutor: ${exp.tutors.min}-${exp.tutors.max} (ideale ${exp.tutors.ideal})`);
      lines.push(`- CMC medio target: ${exp.curve_avg.ideal} (range ${exp.curve_avg.min}-${exp.curve_avg.max})`);

      // Pesi per dimensione → priorità qualitativa
      const w = profile.weights || {};
      const priorities = [];
      if ((w.protection || 0) >= 0.18) priorities.push('PROTEZIONE: priorità ALTA — il mazzo ha bisogno di forte protezione del commander/strategia (target 6-10 pezzi)');
      else if ((w.protection || 0) >= 0.12) priorities.push('Protezione: priorità media (target 4-6 pezzi)');
      else priorities.push('Protezione: priorità bassa (target 2-4 pezzi)');

      if ((w.draw || 0) >= 0.17) priorities.push('CARD DRAW: priorità ALTA — il mazzo deve avere motori di vantaggio costanti');
      if ((w.interaction || 0) >= 0.18) priorities.push('INTERACTION: priorità ALTA — risposta densa al gioco avversario');
      if ((w.synergy || 0) >= 0.18) priorities.push('SINERGIA: priorità ALTA — densità tematica fondamentale, evita filler generico');
      if ((w.ramp || 0) >= 0.16) priorities.push('RAMP: priorità ALTA — accelerazione necessaria, considera 2-mana ramp e rocks');

      if (priorities.length > 0) {
        lines.push('');
        lines.push('PRIORITÀ QUALITATIVE:');
        priorities.forEach(p => lines.push(`- ${p}`));
      }

      // Hint specifici per archetipo
      const archetypeHints = {
        voltron: ['FOCUS: equipment + aure + protezione del commander.', 'Il commander deve passare e fare commander damage.', 'Includi tutor di equipment se possibile.'],
        cedh_combo: ['FOCUS: combo veloce a 2-3 carte + protezione + tutor + draw.', 'CMC molto basso, fast mana se bracket lo permette.'],
        cedh_stax: ['FOCUS: pezzi di stax + draw asimmetrico + win-con tardiva.', 'Ogni carta deve danneggiare gli avversari più di te.'],
        aristocrats: ['FOCUS: sacrifice outlet + token generator + death trigger.', 'Il loop sac/death deve essere ridondante.'],
        reanimator: ['FOCUS: discard outlet + reanimation + grossi target nel cimitero.', 'Pacchetto self-mill o self-discard fondamentale.'],
        control: ['FOCUS: counterspell + removal + draw + 1-2 win-con tardive.', 'Niente threat squilibrati, vinci tardi.'],
        tokens: ['FOCUS: token generator + anthems + sacrifice o overrun finale.', 'Densità di anthems fondamentale.'],
        tribal: ['FOCUS: lord stack + tribali payoff + tutor di tipo creatura.', 'Il tipo creatura deve essere ridondante.'],
        spellslinger: ['FOCUS: instant/sorcery cheap + payoff per cast + recursion.', 'Curva molto bassa, draw alto.'],
        lands_matter: ['FOCUS: terre extra giocate + payoff per land drop + recursion lands.', 'Più terre del normale.'],
        big_mana: ['FOCUS: ramp aggressivo + grosse minacce + ramp produttivo.', 'Curva alta, threat impattanti dopo turno 4.'],
        midrange: ['FOCUS: bilanciamento, le migliori carte dei colori coerenti col commander.'],
      };
      const hints = archetypeHints[archetypeKey] || archetypeHints.midrange;
      if (hints) {
        lines.push('');
        lines.push('LINEA STRATEGICA:');
        hints.forEach(h => lines.push(`- ${h}`));
      }

      // Adatta i numeri al targetNonLand effettivo
      lines.push('');
      lines.push(`Adatta questi numeri al fatto che hai ${targetNonLand} carte non-land disponibili. Non sono vincoli rigidi: deviare è ammesso se la strategia lo giustifica, ma avvicinati il più possibile ai range.`);

      return lines.join('\n');
    }

    // Calcola il numero di terre target per archetipo+curva
    function calculateTargetLandCount(archetypeContext, commander, ramp_count_estimate = 10, archProfile = null) {
      let target = 37;

      // Priorità 1: usa il profilo archetipo se disponibile
      if (archProfile?.expected?.lands?.ideal) {
        target = archProfile.expected.lands.ideal;
      } else {
        // Priorità 2: keyword matching come fallback
        const label = (archetypeContext.label || '').toLowerCase();
        const desc = (archetypeContext.description || '').toLowerCase();
        const fullCtx = (archetypeContext.full_context || '').toLowerCase();
        const text = `${label} ${desc} ${fullCtx}`;

        if (text.includes('cedh')) target = 30;
        else if (text.includes('combo') && text.includes('fast')) target = 32;
        else if (text.includes('big mana') || text.includes('lands matter') || text.includes('ramp aggressivo')) target = 40;
        else if (text.includes('voltron')) target = 37;
        else if (text.includes('control')) target = 38;
        else if (text.includes('aggro')) target = 35;
        else if (text.includes('reanimator')) target = 36;
        else if (text.includes('spellslinger')) target = 36;
      }

      // Aggiustamento ramp: ogni 2 ramp sopra/sotto 10 → -1/+1 lands
      const rampDelta = Math.floor((ramp_count_estimate - 10) / 2);
      target -= rampDelta;

      // Clamp a un range sano (assoluto), ma rispettando il profilo archetipo se più stretto
      let minClamp = 28;
      let maxClamp = 43;
      if (archProfile?.expected?.lands) {
        minClamp = Math.max(minClamp, archProfile.expected.lands.min - 2);
        maxClamp = Math.min(maxClamp, archProfile.expected.lands.max + 2);
      }
      return Math.max(minClamp, Math.min(maxClamp, target));
    }

    // Estrae le terre dal pool EDHREC + raccomanda terre base
    function pickLandsFromPool(edhrecPool, scryfallFetched, targetCount, colorIdentity, existingLands) {
      const lands = [];
      // Carte già fetchate dal pool che sono lands
      const poolLands = (edhrecPool || [])
        .filter(c => {
          const sc = scryfallFetched[c.name.toLowerCase()];
          return sc && (sc.type_line || '').toLowerCase().includes('land');
        });

      // Priorità 1: lands dal mazzo esistente (mode optimize)
      const existingNames = new Set();
      if (existingLands) {
        existingLands.forEach(c => {
          if (lands.length >= targetCount) return;
          if ((c.type_line || '').toLowerCase().includes('land')) {
            lands.push({ name: c.name, source: 'existing' });
            existingNames.add(c.name.toLowerCase());
          }
        });
      }

      // Priorità 2: lands dal pool EDHREC non già aggiunte
      for (const pc of poolLands) {
        if (lands.length >= targetCount) break;
        if (!existingNames.has(pc.name.toLowerCase())) {
          lands.push({ name: pc.name, source: 'edhrec' });
        }
      }

      // Priorità 3: terre base se ancora ne servono
      const basicByColor = { W: 'Plains', U: 'Island', B: 'Swamp', R: 'Mountain', G: 'Forest' };
      const colors = colorIdentity.split('').filter(c => basicByColor[c]);
      let basicIndex = 0;
      while (lands.length < targetCount) {
        if (colors.length === 0) {
          lands.push({ name: 'Wastes', source: 'basic' });
        } else {
          const col = colors[basicIndex % colors.length];
          lands.push({ name: basicByColor[col], source: 'basic' });
          basicIndex++;
        }
      }

      return lands;
    }

    // Genera una decklist ottimizzata
    // APPROCCIO v2:
    // 1. Calcola target lands deterministicamente (fuori da Claude)
    // 2. Usa Sinergie/Cuts per costruire whitelist/blacklist (mode optimize)
    // 3. Claude sceglie SOLO le 62 carte non-land
    // 4. Validazione + check finale + motivazioni in batch
    async function generateOptimizedDeck({
      commander, archetypeContext, bracketTarget, edhrecPool,
      poolMetadata, // info sul pool ibrido (EDHREC + Scryfall)
      mode, // 'fromScratch' o 'optimize'
      existingCards, // solo per mode 'optimize'
      synergiesData, // solo per mode 'optimize': risultato dalla tab Sinergie
      cutsData, // solo per mode 'optimize': risultato dalla tab Cuts (lista carte da escludere)
      data, // per risolvere il profilo archetipo
      apiKey,
      onProgress,
    }) {
      const colorIdentity = (commander.color_identity || []).join('') || 'C';

      if (onProgress) onProgress({ phase: 'Calcolo la mana base ideale...', step: 1, total: 6 });

      // Risolvi profilo archetipo SUBITO (usato per terre + linee guida)
      const { profile: archProfile, key: archKey } = resolveArchetypeProfile(data || {}, archetypeContext);

      // Stima ramp dal mazzo esistente o usa default
      let rampEstimate = 10;
      if (mode === 'optimize' && existingCards) {
        const rampCount = existingCards.filter(c =>
          c.tags?.some(t => t.startsWith('ramp_'))
        ).length;
        rampEstimate = rampCount;
      }

      const targetLands = calculateTargetLandCount(archetypeContext, commander, rampEstimate, archProfile);
      const targetNonLand = 99 - targetLands;

      // Costruisci whitelist (sinergie alte) e blacklist (cuts) per mode optimize
      const whitelistKeep = []; // carte sinergiche da preservare
      const blacklistExclude = new Set(); // carte da NON includere
      const whitelistDescription = [];

      if (mode === 'optimize' && synergiesData?.scores) {
        Object.entries(synergiesData.scores).forEach(([cardName, syn]) => {
          // Tieni le carte enabler/amplifier/protector/tribal/combo_piece con score >= 7
          if (['enabler', 'amplifier', 'protector', 'tribal'].includes(syn.category) && syn.score >= 7) {
            whitelistKeep.push({ name: cardName, category: syn.category, score: syn.score });
          }
        });
        whitelistKeep.sort((a, b) => b.score - a.score);
      }

      if (mode === 'optimize' && cutsData?.cuts) {
        cutsData.cuts.forEach(cut => {
          if (cut.card) blacklistExclude.add(cut.card);
        });
      }

      // === PASSAGGIO 1: Pool dal Scryfall (per validare lands) ===
      if (onProgress) onProgress({ phase: 'Recupero info delle carte del pool...', step: 2, total: 6 });

      const poolNames = (edhrecPool || []).slice(0, 250).map(c => c.name);
      const existingNonLandNames = mode === 'optimize' && existingCards
        ? existingCards.filter(c => !c.isCommander).map(c => c.name)
        : [];
      const allFetchNames = [...new Set([...poolNames, ...existingNonLandNames])];

      const poolFetch = await fetchCardsFromScryfall(allFetchNames);
      const poolFetched = poolFetch.fetched;

      // === PASSAGGIO 2: Selezione delle terre (deterministica) ===
      if (onProgress) onProgress({ phase: `Seleziono ${targetLands} terre...`, step: 3, total: 6 });

      const existingLands = mode === 'optimize' && existingCards
        ? existingCards.filter(c => (c.type_line || '').toLowerCase().includes('land'))
        : [];

      const selectedLands = pickLandsFromPool(
        edhrecPool || [],
        poolFetched,
        targetLands,
        colorIdentity,
        existingLands
      );

      // === PASSAGGIO 3: Claude sceglie le carte non-land ===
      if (onProgress) onProgress({ phase: `Claude seleziona ${targetNonLand} carte non-land...`, step: 4, total: 6 });

      // Costruisci il poolStr distinguendo EDHREC (popolari) da Scryfall mirate (gemme tematiche)
      const nonLandPoolWithSource = (edhrecPool || []).filter(c => {
        const sc = poolFetched[c.name.toLowerCase()];
        return sc && !(sc.type_line || '').toLowerCase().includes('land');
      });
      const edhrecCardsPool = nonLandPoolWithSource.filter(c => c.source === 'edhrec' || !c.source);
      const themedCardsPool = nonLandPoolWithSource.filter(c => c.source === 'scryfall_themed');

      let poolStrEdhrec = edhrecCardsPool.slice(0, 200).map((c, i) => `${i+1}. ${c.name}`).join('\n');
      let poolStrThemed = themedCardsPool.slice(0, 150).map((c, i) => `${i+1}. ${c.name}`).join('\n');
      const poolStr = `=== A) CARTE POPOLARI EDHREC (${edhrecCardsPool.length} totali, mostro le prime 200) ===
${poolStrEdhrec || '(nessuna)'}

=== B) CARTE TEMATICHE DA SCRYFALL (${themedCardsPool.length} totali, mostro le prime 150) ===
Queste sono carte trovate con query mirate sui temi della strategia. Includono "gemme nascoste" che EDHREC non evidenzia.
${poolStrThemed || '(nessuna)'}`;

      const bracketRules = {
        1: 'Bracket 1: niente Game Changer, no MLD, no extra turn, no combo. Casual.',
        2: 'Bracket 2: livello precon. No Game Changer, no MLD, no extra turn chain, no combo, no fast mana.',
        3: 'Bracket 3: max 3 Game Changer. No MLD, no extra turn chain, no combo a 2 carte facili. Tutor moderati.',
        4: 'Bracket 4: ottimizzato non-cEDH, tutto ammesso ma coerente.',
        5: 'Bracket 5 cEDH: tutto ammesso, ottimizzazione massima.',
      };

      const whitelistInstruction = whitelistKeep.length > 0
        ? `\n\nDEVI INCLUDERE OBBLIGATORIAMENTE queste carte sinergiche già giudicate forti per il mazzo (${whitelistKeep.length}):
${whitelistKeep.map(w => `- ${w.name} (${w.category}, sinergia ${w.score}/10)`).join('\n')}`
        : '';

      const blacklistInstruction = blacklistExclude.size > 0
        ? `\n\nNON INCLUDERE queste carte (giudicate inadatte al mazzo nella precedente analisi):
${[...blacklistExclude].map(n => `- ${n}`).join('\n')}`
        : '';

      // Risolvi profilo archetipo per linee guida dinamiche (già risolto sopra)
      const archetypeGuidelines = buildArchetypeGuidelines(archProfile, archKey, archetypeContext, targetNonLand);

      const sysSelect = `Sei un esperto costruttore di mazzi MTG Commander. Selezioni carte non-land per costruire un mazzo ottimizzato per la strategia richiesta. Le terre sono già state scelte separatamente. Ragiona in base alla strategia, non applicare formule fisse: deviare dai range è ammesso quando la strategia lo giustifica. Rispondi SOLO con JSON valido, niente markdown.`;

      const usrSelect = `COMANDANTE: ${commander.name}
TESTO: ${commander.oracle_text}
COLOR IDENTITY: ${colorIdentity}

STRATEGIA:
${archetypeContext.full_context}

BRACKET TARGET: ${bracketTarget} — ${bracketRules[bracketTarget]}

NUMERO TERRE GIÀ FISSATO: ${targetLands} (le ho scelte separatamente, NON includerle nella tua risposta)
DEVI SCEGLIERE ESATTAMENTE: ${targetNonLand} carte non-land

POOL DI CARTE DISPONIBILI:
${poolStr}
${whitelistInstruction}
${blacklistInstruction}

${archetypeGuidelines}

COMPITO:
1. Scegli ESATTAMENTE ${targetNonLand} carte non-land (verifica il conteggio prima di rispondere)
2. Avvicinati ai range del profilo archetipo ma sentiti libero di deviare se la strategia specifica lo richiede
3. Rispetta il bracket e le whitelist/blacklist sopra
4. Le carte devono esistere e rispettare la color identity ${colorIdentity}
5. Mescola scelte canoniche con sinergie meno ovvie ma valide per QUESTO commander
6. IMPORTANTE: pesca ATTIVAMENTE dal gruppo B (carte tematiche da Scryfall) — sono lì apposta per darti opzioni meno ovvie ma sinergiche. Punta a includere almeno 8-15 carte dal gruppo B se sono adatte alla strategia. Non limitarti al gruppo A (popolari EDHREC).
7. Puoi anche scegliere carte FUORI dal pool se sai che sono ottime per la strategia (legali in color identity ${colorIdentity})
8. Spiega in 4-6 frasi italiano la filosofia di costruzione, includendo:
   - Quali pacchetti tematici hai costruito
   - Come la lista esegue la strategia
   - Quali "gemme tematiche" del gruppo B hai scelto e perché
   - Eventuali deviazioni dai range standard e perché

Rispondi con JSON ESATTO:
{
  "build_notes": "filosofia di costruzione 4-6 frasi italiano",
  "card_names": ["Nome 1", "Nome 2", ..., "Nome ${targetNonLand}"]
}`;

      const selectText = await callClaude(apiKey, sysSelect, usrSelect, 4000);
      const selection = extractJsonFromResponse(selectText);

      if (!selection.card_names || !Array.isArray(selection.card_names)) {
        throw new Error('Claude non ha restituito una lista valida di nomi');
      }

      let nonLandNames = selection.card_names.slice(0, targetNonLand);

      // Forza l'inclusione della whitelist se non ci sono già
      if (mode === 'optimize' && whitelistKeep.length > 0) {
        const namesSet = new Set(nonLandNames.map(n => n.toLowerCase()));
        for (const w of whitelistKeep) {
          if (!namesSet.has(w.name.toLowerCase()) && nonLandNames.length < targetNonLand) {
            nonLandNames.push(w.name);
            namesSet.add(w.name.toLowerCase());
          }
        }
      }

      // === PASSAGGIO 4: Validazione su Scryfall ===
      if (onProgress) onProgress({ phase: 'Verifico le carte non-land su Scryfall...', step: 5, total: 6 });

      const { fetched: nonLandFetched, notFound: nonLandNotFound } = await fetchCardsFromScryfall(nonLandNames);
      const landNames = selectedLands.map(l => l.name);
      const { fetched: landFetched, notFound: landNotFound } = await fetchCardsFromScryfall(landNames);
      const allFetched = { ...nonLandFetched, ...landFetched };
      const allNotFound = [...nonLandNotFound, ...landNotFound];

      // === PASSAGGIO 5: Motivazioni in batch ===
      if (onProgress) onProgress({ phase: 'Claude scrive le motivazioni...', step: 6, total: 6 });

      const allNames = [...nonLandNames, ...landNames];
      const motivations = {};
      const BATCH_SIZE = 20;
      const nonLandBatches = [];
      for (let i = 0; i < nonLandNames.length; i += BATCH_SIZE) {
        nonLandBatches.push(nonLandNames.slice(i, i + BATCH_SIZE));
      }

      const sysMot = `Sei un esperto MTG Commander. Per ogni carta indichi categoria, motivazione, e sinergie con altre carte del mazzo. Rispondi SOLO con JSON valido.`;

      for (let bi = 0; bi < nonLandBatches.length; bi++) {
        if (onProgress) onProgress({
          phase: `Motivazioni... batch ${bi+1}/${nonLandBatches.length}`,
          step: 6,
          total: 6,
        });
        const batchNames = nonLandBatches[bi];
        const usrMot = `COMANDANTE: ${commander.name}
STRATEGIA: ${archetypeContext.label}
TUTTE LE CARTE DEL MAZZO (per riferimento sinergie):
${allNames.join(', ')}

CARTE DA MOTIVARE IN QUESTO BATCH:
${batchNames.map((n, i) => `${i+1}. ${n}`).join('\n')}

Per ogni carta:
- category (UNA): ramp | draw | removal | threat | protection | win_con | engine | utility | tribal | combo_piece | tutor
- why: 8-15 parole italiano, perché sta nel mazzo
- referenced_synergies: 1-3 nomi di carte ALTRE del mazzo con cui ha sinergia diretta

JSON:
{"items": [{"name":"...","category":"...","why":"...","referenced_synergies":["..."]}]}`;
        try {
          const motText = await callClaude(apiKey, sysMot, usrMot, 2500);
          const parsed = extractJsonFromResponse(motText);
          if (Array.isArray(parsed.items)) {
            parsed.items.forEach(item => {
              if (item.name) motivations[item.name] = item;
            });
          }
        } catch (e) {
          console.warn(`Batch ${bi} motivazioni fallito:`, e);
        }
        await new Promise(r => setTimeout(r, 150));
      }

      // === PASSAGGIO 6: Assembla risultato + check finale ===
      const cards = [];
      // Non-land
      nonLandNames.forEach(name => {
        const sc = nonLandFetched[name.toLowerCase()];
        const mot = motivations[name] || {};
        cards.push({
          name,
          category: mot.category || guessCategoryFromCard(sc),
          why: mot.why || '(motivazione non disponibile)',
          referenced_synergies: mot.referenced_synergies || [],
          found: !!sc,
          card_data: sc ? normalizeCard(sc, name, false) : null,
          source: mode === 'optimize' && existingNonLandNames.includes(name) ? 'kept_from_original' : 'added',
        });
      });
      // Lands
      selectedLands.forEach(l => {
        const sc = landFetched[l.name.toLowerCase()];
        cards.push({
          name: l.name,
          category: 'land',
          why: l.source === 'basic' ? 'Terra base per la mana base'
             : l.source === 'existing' ? 'Terra del mazzo originale, mantenuta'
             : 'Terra utility/fixing dal pool EDHREC',
          referenced_synergies: [],
          found: !!sc,
          card_data: sc ? normalizeCard(sc, l.name, false) : null,
          source: l.source,
        });
      });

      // Check finali per warning — confrontati con i range del profilo archetipo
      const finalLands = cards.filter(c => c.category === 'land').length;
      const finalRamp = cards.filter(c => c.category === 'ramp').length;
      const finalDraw = cards.filter(c => c.category === 'draw').length;
      const finalRemoval = cards.filter(c => c.category === 'removal').length;
      const finalProtection = cards.filter(c => c.category === 'protection').length;
      const finalTutors = cards.filter(c => c.category === 'tutor').length;
      const finalInteraction = finalRemoval + cards.filter(c => {
        // counter approssimato: cerco "counter target" nel testo della carta originaria
        const txt = (c.card_data?.oracle_text || '').toLowerCase();
        return /counter target/.test(txt);
      }).length;

      const expRange = archProfile.expected;
      const warnings = [];

      // Lands: range hard
      if (finalLands < 28) warnings.push(`${finalLands} terre — sotto il minimo assoluto di 28. Il mazzo non potrà giocare il mana richiesto.`);
      else if (finalLands < expRange.lands.min - 2) warnings.push(`${finalLands} terre — sotto il range previsto per ${archProfile.label} (${expRange.lands.min}-${expRange.lands.max}).`);
      else if (finalLands > expRange.lands.max + 2) warnings.push(`${finalLands} terre — sopra il range previsto per ${archProfile.label} (${expRange.lands.min}-${expRange.lands.max}).`);

      // Ramp
      if (finalRamp < expRange.ramp.min - 2) warnings.push(`${finalRamp} ramp — sotto il range previsto per ${archProfile.label} (${expRange.ramp.min}-${expRange.ramp.max}, ideale ${expRange.ramp.ideal}).`);
      else if (finalRamp > expRange.ramp.max + 2) warnings.push(`${finalRamp} ramp — eccesso rispetto al range per ${archProfile.label} (${expRange.ramp.min}-${expRange.ramp.max}). Valuta di sostituirne alcuni con threat o draw.`);

      // Draw
      if (finalDraw < expRange.draw.min - 2) warnings.push(`${finalDraw} card draw — sotto il range previsto per ${archProfile.label} (${expRange.draw.min}-${expRange.draw.max}, ideale ${expRange.draw.ideal}).`);

      // Interaction (somma removal + counter)
      if (finalInteraction < expRange.interaction.min - 2) warnings.push(`${finalInteraction} interaction (removal + counter) — sotto il range per ${archProfile.label} (${expRange.interaction.min}-${expRange.interaction.max}).`);

      // Tutori
      if (finalTutors > expRange.tutors.max + 2) warnings.push(`${finalTutors} tutor — sopra il tetto consigliato per ${archProfile.label} (max ${expRange.tutors.max}). Potrebbe spingere il bracket sopra il target.`);

      // Protezione: warning specifico per archetipi protection-heavy
      const wProt = archProfile.weights?.protection || 0;
      if (wProt >= 0.18 && finalProtection < 5) {
        warnings.push(`${archProfile.label} con solo ${finalProtection} carte di protezione — l'archetipo richiede protezione alta (target 6-10). Il commander è esposto al removal.`);
      }
      if (wProt >= 0.12 && wProt < 0.18 && finalProtection < 3) {
        warnings.push(`Solo ${finalProtection} carte di protezione — questo archetipo richiede almeno 4-6.`);
      }

      // Total count
      if (cards.length !== 99) warnings.push(`Lista ha ${cards.length} carte invece di 99.`);

      // Generate construction logic explanation
      const constructionLogic = buildConstructionLogic({
        mode,
        targetLands,
        finalLands,
        rampEstimate,
        whitelistKeep,
        blacklistExclude: [...blacklistExclude],
        archetypeContext,
        archetypeProfile: archProfile,
        archetypeKey: archKey,
        bracketTarget,
        cardCount: cards.length,
        finalRamp,
        finalDraw,
        finalRemoval,
        finalInteraction,
        finalProtection,
        finalTutors,
        keptFromOriginal: cards.filter(c => c.source === 'kept_from_original').length,
      });

      // Marca le carte non-land aggiunte se vengono dal pool tematico Scryfall
      const themedPoolNames = new Set(
        (edhrecPool || [])
          .filter(c => c.source === 'scryfall_themed')
          .map(c => c.name.toLowerCase())
      );
      cards.forEach(c => {
        if (c.category !== 'land' && themedPoolNames.has(c.name.toLowerCase())) {
          c.from_themed_pool = true;
        }
      });

      return {
        build_notes: selection.build_notes || '',
        construction_logic: constructionLogic,
        cards,
        commander_name: commander.name,
        commander_data: commander,
        bracket_target: bracketTarget,
        archetype_context: archetypeContext,
        mode,
        target_lands: targetLands,
        warnings,
        not_found: allNotFound,
        whitelist_used: whitelistKeep.map(w => w.name),
        blacklist_used: [...blacklistExclude],
        pool_metadata: poolMetadata || null,
        generated_at: new Date().toISOString(),
      };
    }

    // Costruisce la spiegazione dettagliata della logica di generazione
    function buildConstructionLogic({
      mode, targetLands, finalLands, rampEstimate, whitelistKeep, blacklistExclude,
      archetypeContext, archetypeProfile, archetypeKey,
      bracketTarget, cardCount, finalRamp, finalDraw, finalRemoval, finalInteraction,
      finalProtection, finalTutors, keptFromOriginal,
    }) {
      const lines = [];

      lines.push(`MODALITÀ: ${mode === 'fromScratch' ? 'Generazione da zero' : 'Ottimizzazione del mazzo esistente'}.`);
      lines.push(`STRATEGIA APPLICATA: ${archetypeContext.label}.`);
      if (archetypeContext.description) {
        lines.push(`Descrizione: ${archetypeContext.description}`);
      }
      if (archetypeProfile && archetypeKey) {
        lines.push(`PROFILO ARCHETIPO USATO PER I RANGE: ${archetypeProfile.label} (chiave: ${archetypeKey})`);
      }
      lines.push(`BRACKET TARGET: ${bracketTarget}.`);
      lines.push('');
      lines.push('— MANA BASE —');
      lines.push(`Ho fissato ${targetLands} terre come obiettivo, calcolato in base ad archetipo${mode === 'optimize' ? ` e ramp count del mazzo originale (${rampEstimate} ramp rilevati)` : ''}.`);
      lines.push(`Risultato: ${finalLands} terre nel mazzo finale.`);

      if (mode === 'optimize') {
        lines.push('');
        lines.push('— COERENZA CON ANALISI PRECEDENTE —');
        if (whitelistKeep.length > 0) {
          lines.push(`HO INCLUSO OBBLIGATORIAMENTE le ${whitelistKeep.length} carte già giudicate forti nella tab Sinergie (categoria enabler/amplifier/protector/tribal con score ≥ 7):`);
          whitelistKeep.slice(0, 15).forEach(w => {
            lines.push(`  • ${w.name} — ${w.category}, sinergia ${w.score}/10`);
          });
          if (whitelistKeep.length > 15) {
            lines.push(`  ...e altre ${whitelistKeep.length - 15} carte`);
          }
        } else {
          lines.push('Nessuna whitelist applicata (o non hai eseguito la tab Sinergie).');
        }

        if (blacklistExclude.length > 0) {
          lines.push('');
          lines.push(`HO ESCLUSO le ${blacklistExclude.length} carte già marcate come cut nella tab Cuts & Adds:`);
          blacklistExclude.forEach(n => {
            lines.push(`  • ${n}`);
          });
        } else {
          lines.push('Nessuna blacklist applicata (o non hai eseguito la tab Cuts & Adds).');
        }

        if (keptFromOriginal > 0) {
          lines.push('');
          lines.push(`Ho mantenuto ${keptFromOriginal} carte non-land del mazzo originale.`);
        }
      }

      // Confronto target vs reale per dimensione
      if (archetypeProfile?.expected) {
        const exp = archetypeProfile.expected;
        const fmtRange = (label, real, range) => {
          const inRange = real >= range.min && real <= range.max;
          const marker = inRange ? '✓' : (real < range.min ? '↓ sotto' : '↑ sopra');
          return `${label}: ${real} (target ${range.min}-${range.max}, ideale ${range.ideal}) ${marker}`;
        };
        lines.push('');
        lines.push('— DISTRIBUZIONE vs PROFILO ARCHETIPO —');
        lines.push(fmtRange('Lands', finalLands, exp.lands));
        lines.push(fmtRange('Ramp', finalRamp, exp.ramp));
        lines.push(fmtRange('Card draw', finalDraw, exp.draw));
        lines.push(fmtRange('Interaction (removal+counter)', finalInteraction !== undefined ? finalInteraction : finalRemoval, exp.interaction));
        lines.push(fmtRange('Tutor', finalTutors !== undefined ? finalTutors : 0, exp.tutors));
        if (finalProtection !== undefined) {
          const wProt = archetypeProfile.weights?.protection || 0;
          const protTarget = wProt >= 0.18 ? '6-10' : wProt >= 0.12 ? '4-6' : '2-4';
          lines.push(`Protezione: ${finalProtection} (target archetipo ${protTarget})`);
        }
      } else {
        lines.push('');
        lines.push('— DISTRIBUZIONE FINALE —');
        lines.push(`Carte totali (escluso commander): ${cardCount} (target 99)`);
        lines.push(`Terre: ${finalLands} | Ramp: ${finalRamp} | Card draw: ${finalDraw} | Removal: ${finalRemoval}`);
      }

      lines.push('');
      lines.push(`Carte totali (escluso commander): ${cardCount} (target 99)`);

      return lines.join('\n');
    }

    // Helper: indovina la categoria di una carta dai dati Scryfall (fallback)
    function guessCategoryFromCard(scCard) {
      if (!scCard) return 'utility';
      const types = (scCard.type_line || '').toLowerCase();
      const text = (scCard.oracle_text || '').toLowerCase();
      if (types.includes('land')) return 'land';
      if (/\{t\}.*add\s+\{/i.test(text) && (types.includes('artifact') || types.includes('creature'))) return 'ramp';
      if (/search your library for.*land/i.test(text)) return 'ramp';
      if (/draw .* card/i.test(text)) return 'draw';
      if (/destroy target|exile target|counter target/i.test(text)) return 'removal';
      if (types.includes('creature') && scCard.power && parseInt(scCard.power) >= 4) return 'threat';
      if (/hexproof|indestructible|protection from/i.test(text)) return 'protection';
      if (/search your library for/i.test(text)) return 'tutor';
      return 'utility';
    }

    // ============================================================
    // MODIFICA POST-GENERAZIONE
    // ============================================================

    // Chiede a Claude un diff strutturato in base alla richiesta dell'utente
    async function proposeDeckModification({
      currentDeck, // generated object completo
      userRequest, // testo libero italiano
      apiKey,
      onProgress,
    }) {
      if (onProgress) onProgress({ phase: 'Claude analizza la modifica richiesta...', step: 1, total: 3 });

      const cmdr = currentDeck.commander_data || { name: currentDeck.commander_name };
      const archCtx = currentDeck.archetype_context || {};
      const allCards = currentDeck.cards || [];

      const cardListForPrompt = allCards.map(c =>
        `- ${c.name} | ${c.category} | ${c.why || ''}`
      ).join('\n');

      const sys = `Sei un esperto costruttore di mazzi MTG Commander. L'utente ha generato una decklist e ti chiede di modificarla. Tu proponi un DIFF strutturato (carte da togliere + carte da aggiungere) in modo che la lista finale rimanga di 99 carte (non commander) e rispetti la strategia. Ragiona come un giocatore esperto: se l'utente chiede "più draw togli ramp", scegli tu il ramp meno utile e il draw più sinergico per QUESTO commander. Rispondi SOLO con JSON valido, niente markdown.`;

      const usr = `COMANDANTE: ${cmdr.name}
COLOR IDENTITY: ${(cmdr.color_identity || []).join('') || 'C'}
STRATEGIA: ${archCtx.full_context || archCtx.label || 'midrange'}
BRACKET: ${currentDeck.bracket_target}

LISTA ATTUALE (${allCards.length} carte non commander):
${cardListForPrompt}

RICHIESTA DELL'UTENTE:
${userRequest}

Proponi un diff per soddisfare la richiesta:
- to_remove: carte ESATTE da togliere (devono esistere nella lista attuale, scrivi i nomi esatti)
- to_add: carte nuove da aggiungere (legali nella color identity, non già nel mazzo)
- Mantieni il totale a 99 carte non commander: |to_remove| deve essere uguale a |to_add|
- Spiega perché ogni cambio aiuta la richiesta
- Spiega in 2-3 frasi come questa modifica cambia il mazzo

Rispondi con JSON ESATTO:
{
  "summary": "2-3 frasi italiano: cosa cambia e perché",
  "to_remove": [
    {"name": "Nome esatto carta in lista", "why": "perché tolgo (max 12 parole italiano)"}
  ],
  "to_add": [
    {"name": "Nome nuova carta", "category": "land|ramp|draw|removal|threat|protection|win_con|engine|utility|tribal|combo_piece|tutor", "why": "perché aggiungo (max 15 parole italiano)", "referenced_synergies": ["altra carta del mazzo"]}
  ]
}`;

      const text = await callClaude(apiKey, sys, usr, 3000);
      const parsed = extractJsonFromResponse(text);

      if (!Array.isArray(parsed.to_remove) || !Array.isArray(parsed.to_add)) {
        throw new Error('Diff non valido restituito da Claude');
      }

      // Verifica che to_remove esista nel mazzo (case-insensitive)
      const currentNames = new Set(allCards.map(c => c.name.toLowerCase()));
      const validRemove = parsed.to_remove.filter(r => {
        if (!r.name) return false;
        return currentNames.has(r.name.toLowerCase());
      });

      // Verifica che to_add NON sia già nel mazzo
      const validAdd = parsed.to_add.filter(a => {
        if (!a.name) return false;
        return !currentNames.has(a.name.toLowerCase());
      });

      if (onProgress) onProgress({ phase: 'Verifico le carte nuove su Scryfall...', step: 2, total: 3 });

      // Verifica le nuove carte su Scryfall
      const newNames = validAdd.map(a => a.name);
      const { fetched: newFetched, notFound: newNotFound } = await fetchCardsFromScryfall(newNames);

      validAdd.forEach(a => {
        const sc = newFetched[a.name.toLowerCase()];
        a.found = !!sc;
        a.card_data = sc ? normalizeCard(sc, a.name, false) : null;
      });

      if (onProgress) onProgress({ phase: 'Diff pronto', step: 3, total: 3 });

      return {
        summary: parsed.summary || '',
        to_remove: validRemove,
        to_add: validAdd,
        not_found: newNotFound,
        balance_warning: validRemove.length !== validAdd.length
          ? `Squilibrio: ${validRemove.length} da togliere vs ${validAdd.length} da aggiungere. La lista finale non avrà 99 carte.`
          : null,
        user_request: userRequest,
      };
    }

    // Applica un diff confermato al generated, restituendo la nuova versione
    function applyDiffToGenerated(generated, diff) {
      const removeNames = new Set(diff.to_remove.map(r => r.name.toLowerCase()));
      const newCards = generated.cards.filter(c => !removeNames.has(c.name.toLowerCase()));

      diff.to_add.forEach(a => {
        newCards.push({
          name: a.name,
          category: a.category || 'utility',
          why: a.why || '',
          referenced_synergies: a.referenced_synergies || [],
          found: a.found !== false,
          card_data: a.card_data || null,
          source: 'modification',
        });
      });

      // Cronologia modifiche
      const history = generated.modification_history || [];
      history.push({
        timestamp: new Date().toISOString(),
        user_request: diff.user_request,
        summary: diff.summary,
        removed: diff.to_remove.map(r => r.name),
        added: diff.to_add.map(a => a.name),
      });

      return {
        ...generated,
        cards: newCards,
        modification_history: history,
        last_modified_at: new Date().toISOString(),
      };
    }

    function GenerateTab({ analysis, data, apiKey, onApiKeyMissing, generated, setGenerated, synergies, recommendations }) {
      const [running, setRunning] = useState(false);
      const [progress, setProgress] = useState({ phase: '', step: 0, total: 0 });
      const [error, setError] = useState('');
      const [genMode, setGenMode] = useState('fromScratch'); // fromScratch | optimize
      const [view, setView] = useState('cards'); // cards | text
      const [filter, setFilter] = useState('all');
      const [copied, setCopied] = useState(false);

      const cacheKey = useMemo(() => {
        const archCtx = getEffectiveArchetypeContext(data);
        return `gen_${data.commander?.name}_${archCtx.mode}_${archCtx.label}_${archCtx.description?.slice(0,40) || ''}_b${data.bracketTarget}_${genMode}`;
      }, [data, genMode]);

      // Per modalità optimize, sinergie e cuts sono OBBLIGATORI per garantire coerenza
      const optimizeReady = genMode !== 'optimize' || (synergies && recommendations);

      const handleRun = async () => {
        if (!apiKey) { onApiKeyMissing(); return; }
        if (!data.commander) {
          setError('Manca il commander.');
          return;
        }
        if (genMode === 'optimize' && (!synergies || !recommendations)) {
          setError('Per ottimizzare il mazzo devi prima eseguire le tab "Sinergie" e "Cuts & Adds".');
          return;
        }
        setRunning(true);
        setError('');
        try {
          const archetypeContext = getEffectiveArchetypeContext(data);

          setProgress({ phase: 'Costruisco il pool ibrido EDHREC + Scryfall mirato...', step: 0, total: 6 });
          const hybridPoolData = await buildHybridPool({
            commander: data.commander,
            archetypeContext,
            apiKey,
            onProgress: setProgress,
          });

          const result = await generateOptimizedDeck({
            commander: data.commander,
            archetypeContext,
            bracketTarget: data.bracketTarget,
            edhrecPool: hybridPoolData.pool,
            poolMetadata: hybridPoolData,
            mode: genMode,
            existingCards: genMode === 'optimize' ? analysis.all_cards : null,
            synergiesData: genMode === 'optimize' ? synergies : null,
            cutsData: genMode === 'optimize' ? recommendations : null,
            data,
            apiKey,
            onProgress: setProgress,
          });

          setGenerated(result);
          saveToCache(cacheKey, result);
          setRunning(false);
        } catch (e) {
          setError(e.message);
          setRunning(false);
        }
      };

      const handleClearCache = () => {
        localStorage.removeItem(CACHE_PREFIX + cacheKey);
        setGenerated(null);
      };

      const handleCopyDecklist = () => {
        if (!generated) return;
        const lines = [`1 ${generated.commander_name}`];
        // raggruppa per category in ordine logico
        generated.cards.forEach(c => {
          lines.push(`1 ${c.name}`);
        });
        navigator.clipboard.writeText(lines.join('\n'));
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const handleApplyDiff = (diff) => {
        if (!generated) return;
        const updated = applyDiffToGenerated(generated, diff);
        setGenerated(updated);
        saveToCache(cacheKey, updated);
      };

      // Carica eventuale cache al cambio mode
      useEffect(() => {
        const cached = loadFromCache(cacheKey);
        if (cached) setGenerated(cached);
        else setGenerated(null);
      }, [cacheKey]);

      if (running) {
        return (
          <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-8 text-center">

              {genMode === 'optimize' && optimizeReady && (
                <div className="mb-4 bg-emerald-950/40 border border-emerald-700/40 rounded-lg p-3">
                  <div className="text-xs text-emerald-300">

                    e {recommendations.cuts?.length || 0} carte da escludere come blacklist
                  </div>

                disabled={!optimizeReady}

              >
                {genMode === 'optimize' && !optimizeReady ? 'Completa prima le tab Sinergie e Cuts & Adds' : 'Genera lista'}
              </button>
              {error && <div className="mt-3 text-sm text-red-400">{error}</div>}
            </div>
          </div>
        );
      }

      // Risultati
      const counts = {
        land: generated.cards.filter(c => c.category === 'land').length,
        ramp: generated.cards.filter(c => c.category === 'ramp').length,
        draw: generated.cards.filter(c => c.category === 'draw').length,
        removal: generated.cards.filter(c => c.category === 'removal').length,
        threat: generated.cards.filter(c => c.category === 'threat').length,
        protection: generated.cards.filter(c => c.category === 'protection').length,
        win_con: generated.cards.filter(c => c.category === 'win_con').length,
        engine: generated.cards.filter(c => c.category === 'engine').length,
        utility: generated.cards.filter(c => c.category === 'utility').length,
        tribal: generated.cards.filter(c => c.category === 'tribal').length,
        combo_piece: generated.cards.filter(c => c.category === 'combo_piece').length,
        tutor: generated.cards.filter(c => c.category === 'tutor').length,
